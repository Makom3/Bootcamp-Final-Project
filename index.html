<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <link rel="stylesheet" type="text/css" href="css/styles.css">
</head>
<body>

  <!-- Sign-up form start -->
<div class="container">
    
    <div class="newsletter-right">
      <img src="./assets/images/illustration-sign-up-desktop.svg" alt="Sign-up form illustration" class="desktop-image">
      <img src="./assets/images/illustration-sign-up-mobile.svg" alt="Sign-up form illustration" class="mobile-image"> 
    </div>
      <div class="content-left">
      <h2>Stay updated! </h2>

 <p>  Join 60,000+ product managers receiving monthly updates on: </p>

<ul> <li>Product discovery and building what matters</li>
      <li>Measuring to ensure updates are a success</li>
      <li>And much more!</li> 
</ul>

<form id="subscribe">

    <label>Email address</label><br>

    <input type="text" id="email" placeholder="email@domain.com">
    <br>

    <span id="emailError"></span>
    <br><br>

    <button type="submit">
        Subscribe to monthly newsletter
    </button>

</form>
        </div>
    

</div>
 <script src="js/script.js"></script>
</body> <br>


</html>
